version: '3.8'

services:
  mcp-server:
      build:
            context: .
                  dockerfile: Dockerfile
                      container_name: claude-chatgpt-mcp-server
                          ports:
                                - "3000:3000"
                                    environment:
                                          - CLAUDE_API_KEY=${CLAUDE_API_KEY}
                                                - CHATGPT_API_KEY=${CHATGPT_API_KEY}
                                                      - CHATGPT_MODEL=gpt-4-vision
                                                            - MAX_IMAGE_SIZE_MB=50
                                                                  - OCR_LANGUAGE=en
                                                                        - SERVER_PORT=3000
                                                                              - NODE_ENV=production
                                                                                    - LOG_LEVEL=info
                                                                                        volumes:
                                                                                              - ./images:/app/images:ro
                                                                                                    - ./results:/app/results:rw
                                                                                                        restart: unless-stopped
                                                                                                            networks:
                                                                                                                  - mcp-network
                                                                                                                  
                                                                                                                  networks:
                                                                                                                    mcp-network:
                                                                                                                        driver: bridge
                                                                                                                        
                                                                                                                        volumes:
                                                                                                                          images:
                                                                                                                            results:
